# andrasat.com + legal.andrasat.com
# Deployed via: scripts/nginx_migrate.sh (CI auto-runs when this file changes)
#
# Install as:
#   /etc/nginx/sites-available/andrasat.com.conf
# Then enable with symlink into /etc/nginx/sites-enabled/

upstream andrasat_nuxt_upstream {
  server 127.0.0.1:3000;
  keepalive 32;
}

# Cache Nuxt static assets (self-contained, no dependency on default site)
proxy_cache_path /var/cache/nginx/andrasat-static levels=1:2 keys_zone=ANDRASAT_STATIC:10m inactive=60m use_temp_path=off;

# HTTP -> HTTPS redirect for primary + legal subdomain
server {
  listen 80;
  listen [::]:80;
  server_name andrasat.com legal.andrasat.com;

  return 301 https://$host$request_uri;
}

# Catch-all for unmatched requests (direct IP, unknown hosts)
# Default server for port 80 — redirects to canonical domain
server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  return 301 https://andrasat.com$request_uri;
}

# Main domain over TLS
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name andrasat.com;

  ssl_certificate /etc/letsencrypt/live/andrasat.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/andrasat.com/privkey.pem;

  # Modern baseline TLS settings
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net; font-src 'self' cdn.jsdelivr.net data:; img-src 'self' data:; script-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  client_max_body_size 1m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";

  location /_nuxt {
    proxy_cache ANDRASAT_STATIC;
    proxy_ignore_headers Cache-Control;
    proxy_cache_valid 60m;
    proxy_pass http://andrasat_nuxt_upstream;
  }

  location / {
    proxy_pass http://andrasat_nuxt_upstream;
  }
}

# Legal subdomain over TLS
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name legal.andrasat.com;

  # Ensure this cert includes legal.andrasat.com SAN
  ssl_certificate /etc/letsencrypt/live/andrasat.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/andrasat.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net; font-src 'self' cdn.jsdelivr.net data:; img-src 'self' data:; script-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  client_max_body_size 1m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";

  # Optional fast redirect for legal subdomain root
  location = / {
    return 302 /legal;
  }

  location /_nuxt {
    proxy_cache ANDRASAT_STATIC;
    proxy_ignore_headers Cache-Control;
    proxy_cache_valid 60m;
    proxy_pass http://andrasat_nuxt_upstream;
  }

  location / {
    proxy_pass http://andrasat_nuxt_upstream;
  }
}
