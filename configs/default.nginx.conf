# Virtual Host configuration for example.com
#
# You can move that to a different file under sites-available/ and symlink that
# to sites-enabled/ to enable it.
#
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m inactive=7d use_temp_path=off;

upstream nuxtjs_upstream {
	server localhost:3000;
}

server {
	listen 80;
	listen [::]:80;
	listen 443;
	listen [::]:443;

	server_name 157.245.156.152;

	return 301 https://andrasat.com$request_uri;
}

server {
	listen 443 default_server ssl;
	listen [::]:443 default_server ssl ipv6only=on;

	http2 on;
	server_name andrasat.com;
	ssl_certificate /etc/letsencrypt/live/andrasat.com/fullchain.pem; # managed by Certbot
	ssl_certificate_key /etc/letsencrypt/live/andrasat.com/privkey.pem; # managed by Certbot
	gzip off;

	add_header Strict-Transport-Security "max-age=63072000" always;

	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ecdh_curve X25519:prime256v1:secp384r1;
	ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
	ssl_prefer_server_ciphers off;

	ssl_session_timeout 1d;
	ssl_session_cache shared:MozSSL:10m; # about 40000 sessions

	# DHPARAM
	ssl_dhparam "/home/root/.local/share/dhparam";

	# OCSP Stapling
	ssl_stapling off;

	proxy_http_version 1.1;
	proxy_set_header Upgrade $http_upgrade;
	proxy_set_header Connection 'upgrade';
	proxy_set_header Host $host;
	proxy_cache_bypass $http_upgrade;

	client_max_body_size 1M;

	location /_nuxt {
		proxy_cache STATIC;
		proxy_ignore_headers Cache-Control;
		proxy_cache_valid 60m;
		proxy_pass http://nuxtjs_upstream;
	}

	location / {
		proxy_pass http://nuxtjs_upstream;
	}

}


server {
	if ($host = andrasat.com) {
		return 301 https://$host$request_uri;
	} # managed by Certbot


	listen 80 default_server;
	listen [::]:80 default_server;
	server_name andrasat.com;
	return 404; # managed by Certbot


}