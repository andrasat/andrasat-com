name: Andrasat Nuxt - Release
run-name: ${{ github.actor }} is building... 🚀
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  Semantic-Release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.36
      - name: Install Dependencies
        run: bun install
      - name: Semantic Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bun run semantic-release
  Build-And-Deploy-To-Server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Setup SSH
        run: ./scripts/setup_ssh.sh
        env:
          KEY: ${{ secrets.KEY }}
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
          SSH_HOST_KEY: ${{ secrets.SSH_HOST_KEY }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Detect nginx changes
        id: nginx
        uses: dorny/paths-filter@v3
        with:
          filters: |
            nginx:
              - 'configs/nginx/**'
              - 'scripts/nginx_migrate.sh'
      - name: Install Dependencies
        run: bun install
      - name: Build
        run: bun run build
      - name: Zip Files
        run: |
          cd .output; zip -r public.zip public; mv public.zip ../public.zip;  cd ..
          cd .output; zip -r server.zip server; mv server.zip ../server.zip; cd ..
      - name: Copy App Files
        run: |
          scp public.zip vps:~/
          scp server.zip vps:~/
      - name: Unzip App Files
        run: |
          ssh vps "sudo unzip -o ~/public.zip -d /var/www && sudo unzip -o ~/server.zip -d /var/www && rm ~/public.zip ~/server.zip"
      - name: Restart App Service
        run: |
          scp configs/systemd/andrasat-nuxt.service scripts/deploy_app.sh vps:~/
          ssh vps "sudo bash ~/deploy_app.sh && rm -f ~/deploy_app.sh"
      - name: Copy nginx migration files
        if: steps.nginx.outputs.nginx == 'true'
        run: |
          ssh vps "mkdir -p ~/nginx-config"
          scp -r configs/nginx/* vps:~/nginx-config/
          scp scripts/nginx_migrate.sh vps:~/
      - name: Run nginx migration
        if: steps.nginx.outputs.nginx == 'true'
        run: |
          ssh vps "sudo bash ~/nginx_migrate.sh --config ~/nginx-config/andrasat.com.conf --disable-default"
