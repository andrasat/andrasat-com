name: Andrasat Nuxt - Release
run-name: ${{ github.actor }} is building... 🚀
on:
  push:
    branches:
      - main
jobs:
  Semantic-Release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.36
      - name: Install Dependencies
        run: bun install
      - name: Semantic Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bun run semantic-release
  Build-And-Deploy-To-Server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 2
      - name: Setup SSH
        run: ./scripts/setup_ssh.sh
        env:
          KEY: ${{ secrets.KEY }}
          HOST: ${{ secrets.HOST }}
      - name: Check SSH
        run: test -e $HOME/.ssh/id_rsa && echo "File OK" || exit 1
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Setup Doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Detect nginx changes
        id: nginx
        uses: dorny/paths-filter@v3
        with:
          filters: |
            nginx:
              - 'configs/nginx/**'
              - 'scripts/nginx_migrate.sh'
      - name: Install Dependencies
        run: bun install
      - name: Build
        run: bun run build
        env:
          FA_KIT: ${{ secrets.FA_KIT }}
      - name: Zip Files
        run: |
          cd .output; zip -r public.zip public; mv public.zip ../public.zip;  cd ..
          cd .output; zip -r server.zip server; mv server.zip ../server.zip; cd ..
      - name: Copy App Files
        run: |
          scp public.zip $USER@$HOST:/root/
          scp server.zip $USER@$HOST:/root/
        env:
          HOST: ${{ secrets.HOST }}
          USER: ${{ secrets.USERNAME }}
      - name: Unzip App Files
        run: |
          doctl compute ssh $DROPLET_NAME --ssh-command "unzip -o public.zip -d /var/www"
          doctl compute ssh $DROPLET_NAME --ssh-command "unzip -o server.zip -d /var/www"
          doctl compute ssh $DROPLET_NAME --ssh-command "rm public.zip server.zip"
        env:
          DROPLET_NAME: ${{ secrets.DROPLET_NAME }}
      - name: Copy nginx migration files
        if: steps.nginx.outputs.nginx == 'true'
        run: |
          doctl compute ssh $DROPLET_NAME --ssh-command "mkdir -p /root/nginx-config"
          scp -r configs/nginx/* $USER@$HOST:/root/nginx-config/
          scp scripts/nginx_migrate.sh $USER@$HOST:/root/
        env:
          HOST: ${{ secrets.HOST }}
          USER: ${{ secrets.USERNAME }}
          DROPLET_NAME: ${{ secrets.DROPLET_NAME }}
      - name: Run nginx migration
        if: steps.nginx.outputs.nginx == 'true'
        run: |
          doctl compute ssh $DROPLET_NAME --ssh-command "bash /root/nginx_migrate.sh --config /root/nginx-config/andrasat.com.conf --disable-default"
        env:
          DROPLET_NAME: ${{ secrets.DROPLET_NAME }}
